<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تحميل</title>

<style>
body {
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}

.box {
    margin-top:150px;
}

#count {
    font-size:50px;
    color:red;
}
</style>
</head>

<body>

<div class="box">
    <h1>جاري تجهيز التحميل...</h1>
    <div id="count">5</div>
</div>

<script>
let c = 5;

let timer = setInterval(()=>{
    c--;
    document.getElementById("count").innerText = c;

    if(c == 0){
        clearInterval(timer);
        window.location.href = "thanks.html";
    }
},1000);
</script>

</body>
</html>
