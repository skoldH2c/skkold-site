<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>SkKolD Mixer</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    overflow:hidden;
}

/* خلفية متحركة /
.bg {
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d') center/cover;
    animation:zoom 20s infinite alternate;
    z-index:-1;
    filter:brightness(0.3);
}

@keyframes zoom {
    0%{transform:scale(1);}
    100%{transform:scale(1.2);}
}

/ لودر */
#loader {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    z-index:999;
}

.container {
    text-align:center;
    margin-top:200px;
}

h1 {
    font-size:60px;
    color:red;
}

button {
    padding:15px 40px;
    font-size:20px;
    background:red;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="bg"></div>

<div id="loader">جارٍ التحميل...</div>

<div class="container">
    <h1>SkKolD Mixer</h1>
    <p>برنامج احترافي للصوت</p>
    <button onclick="go()">تحميل الآن</button>
</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/button-3.mp3"></audio>

<script>
// لودر
setTimeout(()=>{
    document.getElementById("loader").style.display="none";
},2000);

// صوت
function playSound(){
    document.getElementById("clickSound").play();
}

// انتقال
function go(){
    playSound();
    window.location.href="download.html";
}
</script>

</body>
</html>

<script>
// منع كلك يمين
document.addEventListener('contextmenu', e => e.preventDefault());

// منع F12
document.onkeydown = function(e) {
    if (e.keyCode == 123) return false;
};

// منع Ctrl+Shift+I
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key === 'I') {
        e.preventDefault();
    }
});
</script>
