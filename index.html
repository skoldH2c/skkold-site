<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>SkKolD Mixer</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    overflow:hidden;
    background:black;
}

/*  لودر /
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
}

.bar{
    width:300px;
    height:5px;
    background:#222;
    margin-top:20px;
}

.fill{
    width:0%;
    height:100%;
    background:red;
    animation:load 3s forwards;
}

@keyframes load{
    to{width:100%;}
}

/  فيديو /
video{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    z-index:-1;
}

/  نص /
h1{
    font-size:60px;
    color:red;
    text-shadow:0 0 20px red;
    animation:glitch 1s infinite;
}

@keyframes glitch{
    0%{text-shadow:2px 2px red;}
    50%{text-shadow:-2px -2px white;}
    100%{text-shadow:2px -2px red;}
}

/  سلايدر /
.slider{
    margin-top:40px;
    overflow:hidden;
}

.slides{
    display:flex;
    animation:slide 15s infinite;
}

.slides img{
    width:280px;
    margin:10px;
    border-radius:10px;
}

@keyframes slide{
    0%{transform:translateX(0);}
    50%{transform:translateX(-50%);}
    100%{transform:translateX(0);}
}

/  زر /
button{
    padding:15px 40px;
    font-size:20px;
    background:red;
    border:none;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 20px red;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 40px red;
}

.container{
    text-align:center;
    margin-top:120px;
}
</style>
</head>

<body>

<!--  لودر -->
<div id="loader">
    <h2>Loading SkKolD...</h2>
    <div class="bar">
        <div class="fill"></div>
    </div>
</div>

<!--  فيديو -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-recording-music-5176/1080p.mp4">
</video>

<div class="overlay"></div>

<div class="container">
    <h1>SkKolD Mixer</h1>
    <p>أفضل تجربة صوت احترافية </p>

    <button onclick="download()">تحميل الآن</button>

    <div class="slider">
        <div class="slides">
            <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d">
            <img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2">
            <img src="https://images.unsplash.com/photo-1497032628192-86f99bcd76bc">
            <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81">
        </div>
    </div>
</div>

<audio id="clickSound" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<script>
/  إخفاء اللودر /
setTimeout(()=>{
    document.getElementById("loader").style.display="none";
},3000);

/  صوت */
function download(){
    document.getElementById("clickSound").play();
    setTimeout(()=>{
        window.location.href="download.html";
    },500);
}
</script>

</body>
</html>
