<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>SkKolD Mixer</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    margin:0;
    font-family:'Cairo', sans-serif;
    background:#000;
    color:#fff;
}

header {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle, #111, #000);
}

h1 {
    font-size:60px;
    color:#ff0000;
    text-shadow:0 0 20px red;
}

p {
    color:#aaa;
    font-size:20px;
}

.btn {
    margin-top:20px;
    padding:15px 40px;
    background:red;
    border:none;
    color:white;
    font-size:20px;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.1);
    background:#cc0000;
}

.section {
    padding:60px;
    text-align:center;
}

.cards {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.card {
    background:#111;
    margin:15px;
    padding:30px;
    border-radius:15px;
    width:220px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-10px);
    box-shadow:0 0 20px red;
}

footer {
    background:#111;
    padding:20px;
    text-align:center;
    color:#666;
}
</style>
</head>

<body>

<header>
    <h1>SkKolD Mixer</h1>
    <p>برنامج ميكسر احترافي بقوة وسرعة عالية</p>
    <button class="btn" onclick="goDownload()">تحميل البرنامج</button>
</header>

<section class="section">
    <h2> مميزات البرنامج</h2>
    <div class="cards">
        <div class="card"> أداء سريع</div>
        <div class="card"> جودة صوت عالية</div>
        <div class="card"> آمن بالكامل</div>
        <div class="card"> لويندوز</div>
    </div>
</section>

<footer>
© 2026 SkKolD
</footer>

<script>
function goDownload(){
    window.location.href = "download.html";
}
</script>

</body>
</html>
