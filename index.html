<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>SkKolD Mixer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:black;
    color:white;
    overflow-x:hidden;
}

/* خلفية متحركة /
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, #1a0000, #000);
    animation: pulse 6s infinite;
    z-index:-1;
}

@keyframes pulse {
    0% {opacity:0.6;}
    50% {opacity:1;}
    100% {opacity:0.6;}
}

/ NAV /
nav {
    display:flex;
    justify-content:space-between;
    padding:20px;
}

.logo {
    color:red;
    font-size:24px;
    text-shadow:0 0 15px red;
}

/ HERO /
.hero {
    text-align:center;
    padding:120px 20px;
}

.hero h1 {
    font-size:65px;
    color:red;
    text-shadow:0 0 25px red;
}

.btn {
    padding:15px 50px;
    font-size:20px;
    background:red;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:12px;
    box-shadow:0 0 20px red;
}

/ VIDEO /
.video {
    text-align:center;
    margin-top:50px;
}

/ FEATURES /
.features {
    display:flex;
    justify-content:center;
    gap:30px;
    padding:80px;
}

.card {
    background:#111;
    padding:30px;
    border:1px solid red;
    border-radius:12px;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.1);
    box-shadow:0 0 25px red;
}

/ FOOTER */
footer {
    text-align:center;
    padding:20px;
    border-top:1px solid red;
}
</style>

</head>

<body>

<nav>
<div class="logo">SkKolD</div>
</nav>

<div class="hero">
    <h1>SkKolD Mixer</h1>
    <p>تجربة صوت احترافية خارقة</p>

    <button class="btn" onclick="goDownload()">تحميل الآن</button>
</div>

<div class="video">
    <iframe width="600" height="315"
    src="https://www.youtube.com/embed/VIDEO_ID"
    frameborder="0" allowfullscreen></iframe>
</div>

<section class="features">
    <div class="card"> سرعة</div>
    <div class="card"> تحكم</div>
    <div class="card"> مجاني</div>
</section>

<footer>
© 2026 SkKolD
</footer>

<script>
function goDownload(){
    window.location.href="download.html";
}
</script>

</body>
</html>
